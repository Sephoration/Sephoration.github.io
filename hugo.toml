# =====================================================================================
# It's recommended to use Alternate Theme Config to configure FixIt
# Modifying this file may result in merge conflict
# There are currently some restrictions to what a theme component can configure:
# params, menu(s), outputformats and mediatypes
# =====================================================================================

# -------------------------------------------------------------------------------------
# Hugo Configuration
# See: https://gohugo.io/configuration/all/
# -------------------------------------------------------------------------------------

# website title
title = "Sephoration"
# hostname (and path) to the root
baseURL = "https://Sephoration.github.io/"
# theme list
theme = ["cmpt-sephoration", "FixIt", "component-projects", "cmpt-markmap"]
# determines default content language ["en", "zh-cn", "fr", "pl", ...]
defaultContentLanguage = "zh-cn"
# language code (deprecated in Hugo v0.158.0, use locale instead)
# languageCode = "zh-CN"
# locale ["zh-CN", "en", "fr", "pl", ...]
locale = "zh-CN"
# language name ["English", "简体中文", "Français", "Polski", ...]
languageName = "简体中文"
# whether to include Chinese/Japanese/Korean
hasCJKLanguage = true
# copyright description used only for seo schema
copyright = ""
# whether to use robots.txt
enableRobotsTXT = true
# whether to use git commit log
enableGitInfo = true
# whether to use emoji code
enableEmoji = true
# suppress v1 dev version warning
ignoreLogs = ['warning-v1-dev', 'error-get-remote-json']
# the main sections of a site
# if set, the MainSections method on the Site object returns the given sections,
# otherwise it returns the section with the most pages.
# mainSections = ["posts"]

# -------------------------------------------------------------------------------------
# Front Matter Configuration
# See: https://gohugo.io/configuration/front-matter/
# -------------------------------------------------------------------------------------

[frontmatter]
_merge = "shallow"
lastmod = [
  "lastmod",
  ":git",
  ":fileModTime",
  ":default",
]

# -------------------------------------------------------------------------------------
# Imaging Configuration
# See: https://gohugo.io/configuration/imaging/
# -------------------------------------------------------------------------------------

[imaging]
_merge = "shallow"
quality = 75

# -------------------------------------------------------------------------------------
# Menu Configuration
# See: https://fixit.lruihao.cn/documentation/basics/#menu-configuration
# -------------------------------------------------------------------------------------

[menus]

[[menus.main]]
identifier = "posts"
name = "文章"
url = "/posts/"
weight = 1

[menus.main.params]
icon = "fa-solid fa-archive"

[[menus.main]]
identifier = "tags"
name = "归类"
url = "/tags/"
weight = 2

[menus.main.params]
icon = "fa-solid fa-tags"



# -------------------------------------------------------------------------------------
# Related content Configuration
# See: https://gohugo.io/content-management/related-content/
# -------------------------------------------------------------------------------------

[related]
includeNewer = false
threshold = 80
toLower = false

[[related.indices]]
applyFilter = false
cardinalityThreshold = 0
name = 'keywords'
pattern = ''
toLower = false
type = 'basic'
weight = 100

[[related.indices]]
applyFilter = false
cardinalityThreshold = 0
name = 'date'
pattern = ''
toLower = false
type = 'basic'
weight = 10

[[related.indices]]
applyFilter = false
cardinalityThreshold = 0
name = 'tags'
pattern = ''
toLower = false
type = 'basic'
weight = 80

[[related.indices]]
applyFilter = false
name = 'fragmentrefs'
type = 'fragments'
weight = 80

# -------------------------------------------------------------------------------------
# Modules Configuration
# See: https://gohugo.io/configuration/module/
# -------------------------------------------------------------------------------------

[module]

[[module.mounts]]
source = "themes/FixIt/layouts/_shortcodes"
target = "layouts/shortcodes"

[[module.mounts]]
source = "layouts/partials"
target = "layouts/partials"

[[module.mounts]]
source = "themes/FixIt/layouts/_partials"
target = "layouts/partials"

[[module.mounts]]
source = "themes/FixIt/layouts/_markup"
target = "layouts/_markup"

[module.hugoVersion]
extended = true
min = "0.161.0"

# -------------------------------------------------------------------------------------
# Markup Configuration
# See: https://gohugo.io/configuration/markup/
# -------------------------------------------------------------------------------------

[markup]
_merge = "shallow"

# Syntax Highlighting (https://gohugo.io/content-management/syntax-highlighting)
[markup.highlight]
# ~~~~~~~~~~ necessary configurations ~~~~~~~~~~
# https://github.com/hugo-fixit/FixIt/issues/43
codeFences = true
noClasses = false
# ~~~~~~~~~~ necessary configurations ~~~~~~~~~~
anchorLineNos = false
guessSyntax = true
lineNos = true
lineNumbersInTable = true

# goldmark is from Hugo 0.60 the default library used for Markdown
# See: https://gohugo.io/configuration/markup/#goldmark
[markup.goldmark]
duplicateResourceFiles = false

[markup.goldmark.extensions]
definitionList = true
footnote = true
linkify = true
linkifyProtocol = 'https'
strikethrough = false
table = true
taskList = true
typographer = true

# See: https://gohugo.io/configuration/markup/#extras
[markup.goldmark.extensions.extras]
enable = true

[markup.goldmark.extensions.extras.delete]
enable = true

[markup.goldmark.extensions.extras.insert]
enable = true

[markup.goldmark.extensions.extras.mark]
enable = true

[markup.goldmark.extensions.extras.subscript]
enable = true

[markup.goldmark.extensions.extras.superscript]
enable = true

# https://gohugo.io/content-management/mathematics/
[markup.goldmark.extensions.passthrough]
enable = true

[markup.goldmark.extensions.passthrough.delimiters]
block = [
  [
    '\[',
    '\]'
  ],
  [
    '$$',
    '$$'
  ]
]
inline = [
  [
    '\(',
    '\)'
  ],
  [
    '$',
    '$'
  ]
]

[markup.goldmark.parser]

[markup.goldmark.parser.attribute]
block = true
title = true

[markup.goldmark.renderer]
hardWraps = false
# whether to use HTML tags directly in the document
unsafe = true
xhtml = false

# -------------------------------------------------------------------------------------
# Sitemap Configuration
# See: https://gohugo.io/templates/sitemap/#configuration
# -------------------------------------------------------------------------------------

[sitemap]
changefreq = "weekly"
disable = false
filename = "sitemap.xml"
priority = 0.5

# -------------------------------------------------------------------------------------
# Permalinks Configuration
# See: https://gohugo.io/content-management/urls/#permalinks
# -------------------------------------------------------------------------------------

[permalinks]

[permalinks.page]
# posts = "/p/:slugorcontentbasename"

[permalinks.section]
# posts = "/posts/:slugorcontentbasename"

[permalinks.taxonomy]

[permalinks.term]

# -------------------------------------------------------------------------------------
# Privacy Configuration
# See: https://gohugo.io/configuration/privacy/
# -------------------------------------------------------------------------------------

[privacy]

[privacy.x]
enableDNT = true

[privacy.youtube]
privacyEnhanced = true

# -------------------------------------------------------------------------------------
# Media Types Configuration
# See: https://gohugo.io/configuration/media-types/
# -------------------------------------------------------------------------------------

# [mediaTypes]
# [mediaTypes."application/feed+json"]
# suffixes = [ "json" ]

# -------------------------------------------------------------------------------------
# Output Format Configuration
# See: https://gohugo.io/configuration/output-formats/
# -------------------------------------------------------------------------------------

[outputFormats]

# Options to make output /offline/index.html file
[outputFormats.offline]
path = "offline"
baseName = "index"
mediaType = "text/html"
isPlainText = false
isHTML = true
permalinkable = true
notAlternative = true

# Options to make output /link/index.html file
[outputFormats.link]
path = "link"
baseName = "index"
mediaType = "text/html"
isPlainText = false
isHTML = true
permalinkable = true
notAlternative = true

# Options to make output readme.md file
[outputFormats.readme]
baseName = "readme"
mediaType = "text/markdown"
isPlainText = true
isHTML = false
notAlternative = true

# Options to make output baidu_urls.txt file
[outputFormats.baidu_urls]
baseName = "baidu_urls"
mediaType = "text/plain"
isPlainText = true
isHTML = false
notAlternative = true

# Options to make output search.json file
[outputFormats.search]
baseName = "search"
mediaType = "application/json"
rel = "search"
isPlainText = true
isHTML = false
permalinkable = true

# Options to make output site.webmanifest file
[outputFormats.manifest]
baseName = "site"
mediaType = "application/manifest+json"
rel = "manifest"
isPlainText = true
isHTML = false

# -------------------------------------------------------------------------------------
# Output Configuration
# See: https://gohugo.io/configuration/outputs/
# -------------------------------------------------------------------------------------

# options to make hugo output files, the optional values are below:
# home = ["html", "rss", "archives", "search", "offline", "manifest", "link", "readme", "baidu_urls"]
# page = ["html", "markdown"]
# section = ["html", "rss"]
# taxonomy = ["html"]
# term = ["html", "rss"]
[outputs]
_merge = "shallow"
home = [
  "html",
  "rss",
  "search",
  "offline",
  "manifest",
  "link"
]
page = [
  "html",
  "markdown"
]
section = [
  "html",
  "rss"
]
taxonomy = [ "html" ]
term = [
  "html",
  "rss"
]

# -------------------------------------------------------------------------------------
# Taxonomies Configuration
# See: https://gohugo.io/configuration/taxonomies/
# -------------------------------------------------------------------------------------

[taxonomies]
_merge = "shallow"
category = "categories"
tag = "tags"
collection = "collections"

# -------------------------------------------------------------------------------------
# Theme Core Configuration
# Two types of params:
#   1. Site-level params — apply to the entire site, can NOT be overridden per-page.
#   2. Page-level params — can be overridden per-page via page front matter.
#
# See: https://fixit.lruihao.cn/documentation/basics/#theme-configuration
# -------------------------------------------------------------------------------------

[params]
# FixIt theme version
version = "1.0.X" # e.g. "0.4.X", "0.4.5", "v1.0.0" etc.
# site description
description = "Eric Sephoration 的个人博客，分享技术与生活"
# site keywords
keywords = ["blog", "技术博客", "Sephoration", "Eric Sephoration"]
# site default theme ["light", "dark", "auto"]
default_theme = "auto"
# which hash function used for SRI, when empty, no SRI is used
# ["sha256", "sha384", "sha512", "md5"]
fingerprint = ""
# date format
date_format = "2006-01-02"
# website images for Open Graph and Twitter Cards
images = []
# whether to add site title to the title of every page
with_site_title = true
# title delimiter when the site title is be added to the title of every page
title_delimiter = "-"
# whether to add site subtitle to the title of index page
index_with_subtitle = false
# whether to enable merging missing translations from other languages
enable_translation_merge = false
# whether to enable tooltip replacement for elements with title attribute, such as footnote references
tooltip = true
# FixIt will, by default, inject a theme meta tag in the HTML head on the home page only.
disable_theme_inject = false

# +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++
# Page-level params
# All params and sections below can be used in page front matter to override per-page.
# +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++

# whether to capitalize titles
capitalize_titles = true
# whether to show summary in plain text
summary_plainify = false
# whether to enable the author's avatar of the post
author_avatar = true
# whether to hide a page from home page
hidden_from_home_page = false
# whether to hide a page from search results
hidden_from_search = false
# whether to hide a page from related posts
hidden_from_related = false
# whether to hide a page from RSS, Atom and JSON feed
hidden_from_feed = false
# whether to enable twemoji
twemoji = false
# whether to enable lightgallery
lightgallery = "force"
# whether to enable the ruby extended syntax
ruby = true
# whether to enable the fraction extended syntax
fraction = true
# whether to enable the fontawesome extended syntax
fontawesome = true
# license info (HTML format is supported)
license = ""
# Page style ["narrow", "normal", "wide", ...]
page_style = "wide"
# Auto Bookmark Support
auto_bookmark = false
# whether to show the last modified time
show_lastmod = true
# whether to enable wordCount
word_count = true
# whether to enable readingTime
reading_time = true
# whether to enable instant.page
instant_page = true
# whether to enable collection list at the sidebar
collection_list = false
# whether to enable collection navigation at the end of the post
collection_navigation = false
# end of post flag
end_flag = ""

# Author Configuration
[params.author]
name = "Eric Sephoration"
email = ""
link = ""
avatar = ""

# Link config
[params.link]
# whether to add external Icon for external links automatically
external_icon = false

# External link guard config
[params.link.guard]
enable = false
mode = "modal"
allow_domains = []

# Image config
[params.image]
cache_remote = false
optimise = false
black_list = []

# Code block wrapper config
[params.codeblock]
wrapper = true
mode = "classic"
wrapper_class = ""
max_shown_lines = 10
shadow = "never"
copyable = true
downloadable = false
fullscreen = false
line_nos_toggler = true
line_wrap_toggler = true
editable = false

# JSON Viewer config
[params.json_viewer]
enable = true
expand_depth = 1
copyable = true
sort = false
boxed = true

# File tree config
[params.filetree]
level = 1
folder_slash = false
ignore_list = []
highlight_list = []

# Mermaid config
[params.mermaid]
wrapper = true
cdn = ""
zenuml = ""
themes = [
  "default",
  "dark"
]
security_level = "loose"
look = "handDrawn"
font_family = ""
layout_loaders = []
layout = "dagre"

# Table of the contents config
[params.toc]
enable = true
keep_static = false
auto = true
position = "right"
ordered = false
start_level = 2
end_level = 6
decrease_h1 = false

# Display a message at the beginning of an article to warn the reader that its content might be expired
[params.expiration_reminder]
enable = false
reminder = 90
warning = 180
close_comment = false

# page heading config
[params.heading]
capitalize = false

[params.heading.number]
enable = false
only_main_section = true

[params.heading.number.format]
h1 = "{title}"
h2 = "{h2} {title}"
h3 = "{h2}.{h3} {title}"
h4 = "{h2}.{h3}.{h4} {title}"
h5 = "{h2}.{h3}.{h4}.{h5} {title}"
h6 = "{h2}.{h3}.{h4}.{h5}.{h6} {title}"

# mathematical formulas configuration
[params.math]
enable = true
type = "katex"

# KaTeX server-side rendering (https://katex.org)
[params.math.katex]
copy_tex = true
throw_on_error = false
error_color = "#ff4949"

[params.math.katex.macros]
# "\\f" = "#1f(#2)" # usage: $\f{a}{b}$

# MathJax server-side rendering (https://www.mathjax.org)
[params.math.mathjax]
cdn = "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"

[params.math.mathjax.packages]
# "[+]" = ["configmacros"]

[params.math.mathjax.macros]
# bold = ["{\\bf #1}", 1]

[params.math.mathjax.loader]
load = [ "ui/safe" ]

[params.math.mathjax.loader.paths]
# custom = "https://cdn.jsdelivr.net/gh/sonoisa/XyJax-v3@3.0.1/build/"

[params.math.mathjax.options]
enable_menu = true
skip_html_tags = [
  "script",
  "noscript",
  "style",
  "textarea",
  "pre",
  "code",
  "math",
  "select",
  "option",
  "mjx-container"
]
ignore_html_class = "mathjax_ignore"

[params.math.mathjax.options.include_html_tags]
# "#comment" = ""
# br = "\n"
# wbr = ""

# Mapbox GL JS config (https://docs.mapbox.com/mapbox-gl-js)
[params.mapbox]
access_token = ""
