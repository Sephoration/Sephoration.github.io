paginate = 20
date_format = "01-02"

[params.list.feed]
limit = -1
full_text = false

# recently updated pages config for archives, section and term list
[params.recently_updated]
archives = true
section = true
list = true
days = 7
max_count = 10

# TagCloud config for tags page
[params.tag_cloud]
enable = true
min = 14
max = 32
peak_count = 10
orderby = "name"

# Home page config
[params.home]

